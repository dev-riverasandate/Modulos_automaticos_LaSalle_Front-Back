<div class="bg-primary text-white p-4 rounded shadow mb-4">
  <h1 class="h3 fw-bold">CRUD Base Dinámico</h1>
  <a class="mt-3 btn btn-success" [routerLink]="['agregar']">Nuevo</a>
</div>

<div class="table-responsive">
  <table class="table table-striped table-bordered align-middle">
    <thead class="table-light">
      <tr>
        <th *ngFor="let col of columnas">{{ col }}</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td *ngFor="let col of columnas">{{ item[col] }}</td>
        <td>
          <a class="btn btn-warning btn-sm me-2"
             [routerLink]="['editar', item[primaryKey]]">Editar</a>
          <a class="btn btn-danger btn-sm"
             [routerLink]="['eliminar', item[primaryKey]]">Eliminar</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
