<h2 class="fw-bold mb-4">Editar registro</h2>
<form (ngSubmit)="guardar()" #formRef="ngForm" *ngIf="form">
  <div *ngFor="let col of columnas" class="mb-3">
    <label class="form-label">{{ col }}</label>
    <input class="form-control" [(ngModel)]="form[col]" [name]="col" required>
  </div>
  <div class="d-flex justify-content-end">
    <button type="submit" class="btn btn-warning me-2">Guardar</button>
    <button type="button" (click)="cancelar()" class="btn btn-secondary">Cancelar</button>
  </div>
</form>
