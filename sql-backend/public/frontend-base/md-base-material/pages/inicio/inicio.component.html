<div class="mat-elevation-z2 p-4 mb-4" style="background: #1976d2; color: #fff; border-radius: 8px;">
  <h1 class="mat-headline">CRUD Base Dinámico</h1>
  <a mat-raised-button color="accent" [routerLink]="['agregar']" class="mt-2">Nuevo</a>
</div>

<div *ngIf="cargando" class="mb-3">
  <mat-progress-bar mode="indeterminate"></mat-progress-bar>
</div>

<div class="table-responsive" *ngIf="!cargando">
  <table mat-table [dataSource]="items" class="mat-elevation-z1 w-100">
    <ng-container *ngFor="let col of columnas" [matColumnDef]="col">
      <th mat-header-cell *matHeaderCellDef>{{ col }}</th>
      <td mat-cell *matCellDef="let item">{{ item[col] }}</td>
    </ng-container>
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let item">
        <a mat-icon-button color="primary" [routerLink]="['editar', item[primaryKey]]">
          <mat-icon>edit</mat-icon>
        </a>
        <a mat-icon-button color="warn" [routerLink]="['eliminar', item[primaryKey]]">
          <mat-icon>delete</mat-icon>
        </a>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columnas.concat(['acciones'])"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas.concat(['acciones']);"></tr>
  </table>
</div>
