<h2 class="text-xl font-bold mb-4">Eliminar registro</h2>
<div *ngIf="item">
  <div *ngFor="let col of columnas">
    <p><strong>{{ col }}:</strong> {{ item[col] }}</p>
  </div>
  <div class="flex justify-end mt-4">
    <button (click)="eliminar()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded mr-2">Eliminar</button>
    <button (click)="cancelar()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Cancelar</button>
  </div>
</div>
<div *ngIf="!item">
  <p>No se encontró el registro.</p>
</div>
