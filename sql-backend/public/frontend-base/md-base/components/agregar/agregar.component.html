<h2 class="text-xl font-bold mb-4">Agregar registro</h2>
<form (ngSubmit)="guardar()" #formRef="ngForm">
  <div *ngFor="let col of columnas" class="mb-4">
    <label class="block mb-1">{{ col }}</label>
    <input class="w-full border rounded px-3 py-2" [(ngModel)]="form[col]" [name]="col" required>
  </div>
  <div class="flex justify-end">
    <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded mr-2">Guardar</button>
    <button type="button" (click)="cancelar()" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded">Cancelar</button>
  </div>
</form>
